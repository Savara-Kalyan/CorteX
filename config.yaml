
LLM:
  PROVIDER: OPENAI
  MODEL: gpt-4o-mini

EMBEDDINGS:
  PROVIDER: openai
  MODEL: text-embedding-3-small

QUERY_UNDERSTANDING:
  PROVIDER: openai
  MODEL: gpt-4o-mini
  TEMPERATURE: 0.3

CHUNKING:
  CHUNK_SIZE: 512
  CHUNK_OVERLAP: 100
  DOMAIN_OVERRIDES:
    hr:
      CHUNK_SIZE: 512
      CHUNK_OVERLAP: 96
    engineering:
      CHUNK_SIZE: 768
      CHUNK_OVERLAP: 128
    culture:
      CHUNK_SIZE: 256
      CHUNK_OVERLAP: 50

RETRIEVAL:
  TOP_K: 5
  FETCH_K: 40

VECTOR_STORE:
  PROVIDER: pgvector
  # PGVECTOR_URL env var overrides this at runtime (set automatically in docker-compose)
  CONNECTION_STRING: "postgresql://cortex:cortex@localhost:5432/cortexdb"

# To switch to Qdrant, replace the VECTOR_STORE block with:
# VECTOR_STORE:
#   PROVIDER: qdrant
#   URL: "http://localhost:6333"
#   API_KEY: ""              # optional, for Qdrant Cloud
#   COLLECTION_NAME: "documents"
