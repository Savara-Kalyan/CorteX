
LLM:
  PROVIDER: OPENAI
  MODEL: gpt-5.4-nano-2026-03-17

EMBEDDINGS:
  PROVIDER: openai
  MODEL: text-embedding-3-small

# To switch to Anthropic embeddings:
# EMBEDDINGS:
#   PROVIDER: anthropic
#   MODEL: voyage-3


INGESTION:
  CHAR_COUNT_THRESHOLD: 500   # min chars from unstructured before falling back to Docling
  SAMPLE_PAGES: 2             # number of PDF pages to sample with unstructured

VECTOR_STORE:
  PROVIDER: pgvector
  CONNECTION_STRING: "postgresql://cortex:cortex@vector_store:5432/cortex_vectors"

# To switch to Qdrant, replace the above with:
# VECTOR_STORE:
#   PROVIDER: qdrant
#   URL: "http://localhost:6333"
#   API_KEY: ""              # optional, for Qdrant Cloud
#   COLLECTION_NAME: "documents"

