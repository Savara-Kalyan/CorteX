[pytest]
# Where to find tests
testpaths = tests
pythonpath = .

# Minimum Python version
minversion = 7.0

# Asyncio mode
asyncio_mode = auto

# Verbose output
addopts = -v --tb=short

# Markers for organizing tests
markers =
    unit: Unit tests
    integration: Integration tests
    slow: Slow tests
    asyncio: Async tests